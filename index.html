<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Escaner de Red</title>
  <link rel="stylesheet" href="scanner.css" />
</head>
<body>

  <div id="app">

    <header>
      <h1>Net<span>Scan</span></h1>
      <p>Simulador de escaneo de red</p>
    </header>

    <div id="controls">
      <input
        type="text"
        id="ip-input"
        placeholder="192.168.1.0/24"
        autocomplete="off"
        spellcheck="false"
      />
      <button id="scan-btn">
        <svg width="16" height="16" viewBox="0 0 32 32" fill="none">
          <circle cx="16" cy="16" r="10" stroke="#0d0d0d" stroke-width="1.5"/>
          <circle cx="16" cy="16" r="5"  stroke="#0d0d0d" stroke-width="1.5"/>
          <line x1="16" y1="4"  x2="16" y2="8"  stroke="#0d0d0d" stroke-width="1.5"/>
          <line x1="16" y1="24" x2="16" y2="28" stroke="#0d0d0d" stroke-width="1.5"/>
          <line x1="4"  y1="16" x2="8"  y2="16" stroke="#0d0d0d" stroke-width="1.5"/>
          <line x1="24" y1="16" x2="28" y2="16" stroke="#0d0d0d" stroke-width="1.5"/>
        </svg>
        Escanear
      </button>
      <button id="reset-btn">Reset</button>
    </div>

    <div id="scanner-wrap">
      <canvas id="radar-canvas"></canvas>
      <div id="node-layer"></div>
    </div>

    <div id="results-panel" class="hidden">
      <div id="scan-stats">
        <div class="stat"><span id="stat-total">0</span><label>hosts</label></div>
        <div class="stat"><span id="stat-up">0</span><label>activos</label></div>
        <div class="stat"><span id="stat-ports">0</span><label>puertos abiertos</label></div>
        <div class="stat"><span id="stat-time">0s</span><label>tiempo</label></div>
      </div>
      <div id="host-list"></div>
    </div>

  </div>

  <script src="scanner.js"></script>
</body>
</html>
